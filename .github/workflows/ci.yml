name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests (pure numpy, no sim)
        run: |
          pytest tests/unit/ -v --tb=short

      - name: Run integration tests (import sanity)
        run: |
          pytest tests/integration/ -v --tb=short

      - name: Quick import check
        run: |
          python -c "from unified.adapters.state_adapter import gympybullet_to_crazyflow; print('✅ state_adapter OK')"
          python -c "from unified.adapters.action_adapter import rpm_to_attitude; print('✅ action_adapter OK')"
